<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qflow - Lightweight Workflow and Agent Library</title>
    <script>
        (function () {
            try {
                var saved = localStorage.getItem('qflow-theme');
                var theme = saved || 'dark';
                document.documentElement.setAttribute('data-theme', theme);
                if (!saved) localStorage.setItem('qflow-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css" rel="stylesheet" />
    <style>
        :root {
            --ink: #0c0f14;
            --paper: #f5f3ef;
            --muted: #5b6270;
            --accent: #0f766e;
            --accent-2: #f59e0b;
            --ring: rgba(15, 118, 110, 0.25);
            --surface: rgba(255, 255, 255, 0.75);
            --surface-2: rgba(255, 255, 255, 0.9);
            --border: rgba(15, 23, 42, 0.12);
            --code-bg: #000000;
            --code-header: #0a0a0a;
            --code-text: #e2e8f0;
            --shadow: 0 20px 60px rgba(10, 15, 20, 0.1);
        }
        [data-theme="dark"] {
            --ink: #e5e7eb;
            --paper: #0a0f1a;
            --muted: #94a3b8;
            --accent: #34d399;
            --accent-2: #fbbf24;
            --ring: rgba(52, 211, 153, 0.3);
            --surface: rgba(15, 23, 42, 0.7);
            --surface-2: rgba(15, 23, 42, 0.92);
            --border: rgba(148, 163, 184, 0.2);
            --code-bg: #000000;
            --code-header: #0a0a0a;
            --code-text: #e2e8f0;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        * { box-sizing: border-box; }
        html, body {
            max-width: 100%;
            overflow-x: hidden;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: radial-gradient(1200px 700px at 10% -10%, #e6f5f2 0%, transparent 55%),
                        radial-gradient(900px 600px at 90% 0%, #fff3d8 0%, transparent 50%),
                        var(--paper);
            color: var(--ink);
            transition: background 0.3s ease, color 0.3s ease;
        }
        img, video, canvas, svg {
            max-width: 100%;
            height: auto;
        }
        pre, code {
            max-width: 100%;
        }
        [data-theme="dark"] body {
            background: radial-gradient(1200px 700px at 10% -10%, rgba(16, 185, 129, 0.12) 0%, transparent 55%),
                        radial-gradient(900px 600px at 90% 0%, rgba(251, 191, 36, 0.12) 0%, transparent 50%),
                        var(--paper);
        }
        h1, h2, h3, h4, h5, h6, .font-display {
            font-family: 'Fraunces', serif;
        }
        code, pre {
            font-family: 'JetBrains Mono', monospace;
        }
        .noise {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='120' height='120' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
            mix-blend-mode: multiply;
            z-index: -1;
        }
        .glow-orb {
            position: absolute;
            border-radius: 999px;
            filter: blur(60px);
            opacity: 0.5;
        }
        .reveal {
            opacity: 0;
            transform: translateY(16px);
            animation: reveal 0.8s ease forwards;
        }
        .reveal-1 { animation-delay: 0.05s; }
        .reveal-2 { animation-delay: 0.15s; }
        .reveal-3 { animation-delay: 0.25s; }
        .reveal-4 { animation-delay: 0.35s; }
        .float-slow {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes reveal {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .glass {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            min-width: 0;
        }
        .surface {
            background: var(--surface-2);
            border: 1px solid var(--border);
            min-width: 0;
        }
        .shadow-soft {
            box-shadow: var(--shadow);
        }
        .text-muted { color: var(--muted); }
        .text-ink { color: var(--ink); }
        .text-accent { color: var(--accent); }
        .bg-accent { background: var(--accent); }
        .border-accent { border-color: var(--accent); }
        .chip {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--muted);
        }
        .chip-accent {
            background: rgba(15, 118, 110, 0.12);
            border: 1px solid rgba(15, 118, 110, 0.3);
            color: var(--accent);
        }
        [data-theme="dark"] .chip-accent {
            background: rgba(52, 211, 153, 0.12);
            border-color: rgba(52, 211, 153, 0.3);
        }
        .input-field {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--ink);
        }
        .input-field::placeholder { color: var(--muted); }
        .nav-link {\n            color: var(--muted);\n            transition: color 0.2s ease;\n        }\n        .nav-link:hover {\n            color: var(--ink);\n        }
        .code-block {
            background: var(--code-bg);
            color: var(--code-text);
            border: 1px solid rgba(148, 163, 184, 0.2);
            max-width: 100%;
            min-width: 0;
            overflow-x: auto;
        }
        .code-header {\n            background: var(--code-header);\n        }
        .code-block pre {
            font-size: 0.75rem;
            line-height: 1.4;
            max-width: 100%;
            overflow-x: auto;
        }
        .code-block code {
            font-size: 0.75rem;
            display: block;
            max-width: 100%;
        }
        .prose {
            overflow-wrap: anywhere;
        }
        .prose code {
            white-space: pre-wrap;
            word-break: break-word;
        }
        .param-token {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--ink);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
        }
    </style>
</head>
<body class="antialiased">
    <div class="noise"></div>
    <div id="root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

    <script src="data/nodeDocs.js"></script>
    <script src="data/examples.js"></script>
    <script type="text/babel" src="components/Navbar.js"></script>
    <script type="text/babel" src="components/Footer.js"></script>
    <script type="text/babel" src="components/CodeBlock.js"></script>
    <script type="text/babel" src="pages/LandingPage.js"></script>
    <script type="text/babel" src="pages/GettingStartedPage.js"></script>
    <script type="text/babel" src="pages/DocsPage.js"></script>
    <script type="text/babel" src="pages/ExamplesPage.js"></script>
    <script type="text/babel" src="app.js"></script>
</body>
</html>
